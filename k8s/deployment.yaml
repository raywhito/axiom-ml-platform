apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiom-ml-api
  labels:
    app: axiom-ml-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: axiom-ml-api
  template:
    metadata:
      labels:
        app: axiom-ml-api
    spec:
      containers:
        - name: api
          image: ghcr.io/raywhito/axiom-ml:latest
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: axiom-ml-api
  labels:
    app: axiom-ml-api
spec:
  selector:
    app: axiom-ml-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
