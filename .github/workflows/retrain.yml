name: Scheduled retraining

on:
  schedule:
    - cron: "0 3 * * 1"   # every Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      force_promote:
        description: "Promote challenger even if it doesn't beat the champion"
        type: boolean
        default: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train baseline (champion)
        run: python src/train.py

      - name: Run retraining (challenger vs champion)
        env:
          FORCE_PROMOTE: ${{ inputs.force_promote }}
        run: python retrain/retrain.py

      - name: Generate drift report
        run: python monitoring/drift_report.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrain-outputs
          path: |
            models/metrics.json
            monitoring/reports/
