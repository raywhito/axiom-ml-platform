# ════════════════════════════════════════════════════════════════════════════
# AXIOM ML Platform — local stack (Block 4)
# Ports are offset (8000/9091/3001/5001/8090) so this can run ALONGSIDE the
# Block 3 real-time pipeline stack.
# ════════════════════════════════════════════════════════════════════════════
name: axiom-ml

services:
  api:
    build: .
    image: axiom-ml:latest
    container_name: ml-api
    command: ["bash", "-c", "cd api && uvicorn main:app --host 0.0.0.0 --port 8000"]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./monitoring/reports:/app/monitoring/reports
    ports:
      - "8000:8000"
    restart: unless-stopped

  mlflow:
    image: axiom-ml:latest
    container_name: ml-mlflow
    command: ["mlflow", "server", "--backend-store-uri", "file:///app/mlruns",
              "--host", "0.0.0.0", "--port", "5000"]
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5001:5000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ml-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: ml-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ml-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # Serves the Evidently drift report (generated by `make monitor`)
  report-server:
    image: nginx:alpine
    container_name: ml-reports
    volumes:
      - ./monitoring/reports:/usr/share/nginx/html:ro
    ports:
      - "8090:80"
    restart: unless-stopped

volumes:
  ml-grafana-data:
